name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install (build Cython extensions)
        run: pip install -e ".[dev]"

      - name: Run full test suite
        run: pytest -q

      - name: Run solver unit tests
        run: pytest -q -m solver tests/test_solvers.py

      - name: Run property / invariant tests
        run: pytest -q -m property tests/test_properties.py

      - name: Run GCW coupling tests
        run: pytest -q -m gcw tests/test_gcw_coupling.py

      - name: Run GCW memoization stress (repeated, Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          for seed in 0 1 2 3 4; do
            pytest -q -m gcw_stress tests/test_gcw_coupling.py --randomly-seed=$seed
          done

      - name: Run full suite in random order
        run: pytest -q --randomly-seed=last
