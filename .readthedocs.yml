version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.10"
  apt_packages:
    - g++
  jobs:
    post_install:
      # Reinstall editable so Cython extensions are importable from the checkout
      # (plain `pip install .` can leave extension submodules unavailable to
      # mkdocstrings on RTD).
      - pip install --no-build-isolation -e ".[docs]"
      - python -c "import sparc.eval; import sparc.nodes; import sparc.queries.cw"

python:
  install:
    - method: pip
      path: .
      extra_requirements:
        - docs

mkdocs:
  configuration: mkdocs.yml
